<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Roteiros | Coco and Luna</title>
    <link rel="shortcut icon" href="./caneta-e-papel.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2B5FED;
            --brand-blue-hover: #1e45b3;
            --sidebar-bg: #111827;
            --sidebar-hover: #1f2937;
        }
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; height: 100vh; overflow: hidden; }
        .app-container { display: flex; height: 100vh; }
        .sidebar { width: 320px; background-color: var(--sidebar-bg); color: #f9fafb; display: flex; flex-direction: column; overflow-y: auto; z-index: 10; }
        .sidebar-header { padding: 24px 20px; border-bottom: 1px solid #374151; }
        .historico-item { padding: 16px 20px; border-bottom: 1px solid #374151; cursor: pointer; transition: all 0.2s ease; }
        .historico-item:hover { background-color: var(--sidebar-hover); border-left: 4px solid var(--brand-blue); }
        .historico-data { font-size: 0.75rem; color: #9ca3af; margin-top: 4px; }
        .historico-titulo { font-size: 0.9rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .max-w-custom { max-width: 900px; margin: 0 auto; }
        .card { border: none; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .form-label { font-weight: 600; color: #374151; font-size: 0.9rem; }
        .btn-primary { background-color: var(--brand-blue); border: none; border-radius: 8px; }
        .btn-primary:hover { background-color: var(--brand-blue-hover); }
        .btn-random { background-color: #6366f1; color: white; border: none; border-radius: 8px; }
        #resultado { background: #fff; border-left: 4px solid var(--brand-blue); white-space: pre-wrap; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header d-flex justify-content-between align-items-center">
                <h5 class="m-0 fs-6 fw-bold">Coco and Luna - Criador de Roteiros</h5>
                <button onclick="novaSessao()" class="btn btn-sm btn-outline-light"> + Novo</button>
            </div>
            <div id="listaHistorico" class="flex-grow-1"></div>
        </div>

        <div class="main-content">
            <div class="container-fluid max-w-custom">
                <div class="card p-5 mb-4" id="painelCriacao">
                    <div class="text-center mb-4">
                        <h2 class="h3 fw-bold text-dark">Gerador de Roteiros Inteligente</h2>
                        <small>Esse app utiliza a API do Claude Console (Anthropic) - Tokens são gastos por uso, sem limites diários pré-definidos.</small>
                    </div>
                    
                    <form id="formRoteiro" onsubmit="event.preventDefault(); revisarPedido();">
                        <div class="row g-4">
                            <div class="col-md-4">
                                <label class="form-label">Mercado</label>
                                <select id="mercado" class="form-select bg-light">
                                    <option value="Brasil">Brasil BR</option>
                                    <option value="EUA">EUA US</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Quem aparece?</label>
                                <select id="narrador" class="form-select bg-light">
                                    <option value="Veterinária da marca">Veterinária da marca</option>
                                    <option value="Colaborador(a) da empresa">Colaborador(a) da empresa</option>
                                    <option value="Pet do colaborador">Pet do colaborador</option>
                                    <option value="UGC parceiro">UGC parceiro</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Formato Narrativo</label>
                                <select id="formato" class="form-select bg-light">
                                    <option value="Tela dividida">Tela dividida</option>
                                    <option value="Palestrinha">Palestrinha</option>
                                    <option value="Narrado">Narrado</option>
                                    <option value="Cine">Cine</option>
                                    <option value="Storytelling visual">Storytelling visual</option>
                                    <option value="Tela verde">Tela verde</option>
                                    <option value="Conflito situacional">Conflito situacional</option>
                                    <option value="Diálogo: Conflito">Diálogo: Conflito</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Tema Principal</label>
                                <select id="tema" class="form-select" required>
                                    <option value="" disabled selected>Selecione um tema...</option>
                                    <option value="1. Casa em Caos (Gases do Pet)">1. Casa em Caos (Gases do Pet)</option>
                                    <option value="3. Confissões do Pet">3. Confissões do Pet</option>
                                    <option value="9. Saúde Renal em Gatos">9. Saúde Renal em Gatos</option>
                                    <option value="13. Antes e Depois">13. Antes e Depois</option>
                                    <option value="23. Longevidade do Pet">23. Longevidade do Pet</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Gancho de Abertura</label>
                                <select id="gancho" class="form-select" required>
                                    <option value="" disabled selected>Selecione um gancho...</option>
                                    <option value="1. Os truques proibidos...">1. Os truques proibidos...</option>
                                    <option value="7. Você sabe se seu pet te ama?">7. Você sabe se seu pet te ama?</option>
                                    <option value="14. Levamos anos para aprender isso...">14. Levamos anos para aprender isso...</option>
                                    <option value="22. Dinheiro não compra barriga saudável.">22. Dinheiro não compra barriga saudável.</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Notas Adicionais</label>
                                <textarea id="notas" class="form-control" rows="2"></textarea>
                            </div>
                            <div class="col-12 d-flex gap-2">
                                <button type="button" onclick="gerarAleatorio()" class="btn btn-random w-25 fw-bold">🎲 Aleatório</button>
                                <button type="submit" class="btn btn-primary flex-grow-1 fw-bold"> GERAR ROTEIRO</button>
                            </div>
                        </div>
                    </form>
                </div>

                <div id="painelRevisao" class="card p-5 d-none text-center">
                    <h4 class="fw-bold mb-4">Confirmar Combinação Inteligente?</h4>
                    <div class="text-start bg-light p-4 rounded mb-4" id="resumoCombinacao"></div>
                    <div class="d-flex gap-2">
                        <button onclick="gerarAleatorio()" class="btn btn-outline-secondary w-50">Girar Outra</button>
                        <button onclick="confirmarEnvio()" class="btn btn-primary w-50 fw-bold">Confirmar e Criar</button>
                    </div>
                </div>

                <div id="loading" class="text-center d-none my-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <h5 class="mt-3">Claude está redigindo o briefing...</h5>
                </div>

                <div id="resultadoContainer" class="card p-5 d-none">
                    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                        <h4 class="m-0 text-primary fw-bold" id="resultadoTitulo"> Briefing Finalizado</h4>
                        <button onclick="copiarTexto()" class="btn btn-outline-primary"> Copiar</button>
                    </div>
                    <div id="resultado" class="p-4 bg-light rounded"></div>
                    <button onclick="novaSessao()" class="btn btn-link mt-3 text-muted">Gerar outro roteiro</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", carregarHistorico);

        function gerarAleatorio() {
            const selects = ['mercado', 'narrador', 'formato', 'tema', 'gancho'];
            selects.forEach(id => {
                const el = document.getElementById(id);
                const options = Array.from(el.options).filter(o => !o.disabled);
                const randomOption = options[Math.floor(Math.random() * options.length)];
                el.value = randomOption.value;
            });
            // Se estiver na tela de revisão, atualiza o resumo
            if (!document.getElementById('painelRevisao').classList.contains('d-none')) {
                revisarPedido();
            }
        }

        function revisarPedido() {
            const resumo = `
                <strong>Mercado:</strong> ${document.getElementById('mercado').value}<br>
                <strong>Narrador:</strong> ${document.getElementById('narrador').value}<br>
                <strong>Formato:</strong> ${document.getElementById('formato').value}<br>
                <strong>Tema:</strong> ${document.getElementById('tema').value}<br>
                <strong>Gancho:</strong> ${document.getElementById('gancho').value}
            `;
            document.getElementById('resumoCombinacao').innerHTML = resumo;
            document.getElementById('painelCriacao').classList.add('d-none');
            document.getElementById('painelRevisao').classList.remove('d-none');
        }

        async function confirmarEnvio() {
            const painelRevisao = document.getElementById('painelRevisao');
            const loading = document.getElementById('loading');
            const resContainer = document.getElementById('resultadoContainer');
            const resDiv = document.getElementById('resultado');

            const dados = {
                mercado: document.getElementById('mercado').value,
                narrador: document.getElementById('narrador').value,
                formato: document.getElementById('formato').value,
                tema: document.getElementById('tema').value,
                gancho: document.getElementById('gancho').value,
                notas: document.getElementById('notas').value
            };

            painelRevisao.classList.add('d-none');
            loading.classList.remove('d-none');

            try {
                const response = await fetch('/api/gerar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });
                const data = await response.json();
                resDiv.innerText = data.roteiro;
                resContainer.classList.remove('d-none');
                carregarHistorico();
            } catch (error) {
                alert('Erro ao gerar. Verifique o console.');
                novaSessao();
            } finally {
                loading.classList.add('d-none');
            }
        }

        async function carregarHistorico() {
            const response = await fetch('/api/historico');
            const roteiros = await response.json();
            const lista = document.getElementById('listaHistorico');
            lista.innerHTML = roteiros.map(rot => `
                <div class="historico-item" onclick='exibirRoteiroSalvo(${JSON.stringify(rot)})'>
                    <div class="historico-titulo">${rot.tema}</div>
                    <div class="historico-data">${new Date(rot.dataCriacao).toLocaleString()} • ${rot.mercado}</div>
                </div>
            `).join('');
            if (roteiros.length === 0) lista.innerHTML = '<div class="p-4 text-center text-muted small">Nenhum roteiro salvo.</div>';
        }

        function exibirRoteiroSalvo(rot) {
            document.getElementById('painelCriacao').classList.add('d-none');
            document.getElementById('painelRevisao').classList.add('d-none');
            document.getElementById('resultadoContainer').classList.remove('d-none');
            document.getElementById('resultado').innerText = rot.conteudo;
        }

        function novaSessao() {
            document.getElementById('resultadoContainer').classList.add('d-none');
            document.getElementById('painelRevisao').classList.add('d-none');
            document.getElementById('painelCriacao').classList.remove('d-none');
            document.getElementById('formRoteiro').reset();
        }

        function copiarTexto() {
            navigator.clipboard.writeText(document.getElementById('resultado').innerText);
            alert('Copiado!');
        }
    </script>
</body>
</html>
