<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Roteiros | Coco and Luna</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2B5FED;
            --brand-blue-hover: #1e45b3;
            --sidebar-bg: #111827;
            --sidebar-hover: #1f2937;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f3f4f6; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        .app-container { display: flex; height: 100vh; }
        
        /* Menu Lateral Estilizado */
        .sidebar { 
            width: 320px; 
            background-color: var(--sidebar-bg); 
            color: #f9fafb; 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 10;
        }
        .sidebar-header { 
            padding: 24px 20px; 
            border-bottom: 1px solid #374151; 
        }
        .historico-item { 
            padding: 16px 20px; 
            border-bottom: 1px solid #374151; 
            cursor: pointer; 
            transition: all 0.2s ease; 
        }
        .historico-item:hover { background-color: var(--sidebar-hover); padding-left: 24px; border-left: 4px solid var(--brand-blue); }
        .historico-data { font-size: 0.75rem; color: #9ca3af; margin-top: 4px; }
        .historico-titulo { font-size: 0.9rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Área Principal */
        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .max-w-custom { max-width: 900px; margin: 0 auto; }
        
        /* Cards e Formulários Modernos */
        .card { 
            border: none; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }
        .form-label { font-weight: 600; color: #374151; font-size: 0.9rem; margin-bottom: 8px;}
        .form-select, .form-control { 
            border-radius: 8px; 
            padding: 12px;
            border-color: #d1d5db;
        }
        .form-select:focus, .form-control:focus {
            border-color: var(--brand-blue);
            box-shadow: 0 0 0 0.25rem rgba(43, 95, 237, 0.25);
        }
        
        /* Botões Azuis da Marca */
        .btn-primary { 
            background-color: var(--brand-blue); 
            border: none; 
            border-radius: 8px;
            transition: all 0.2s;
        }
        .btn-primary:hover { 
            background-color: var(--brand-blue-hover); 
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(43, 95, 237, 0.3);
        }
        
        #resultado { 
            background: #fff; 
            border-left: 4px solid var(--brand-blue); 
            white-space: pre-wrap; 
            font-size: 0.95rem; 
            line-height: 1.6;
        }
        .text-brand { color: var(--brand-blue) !important; }
        .border-brand { border-color: var(--brand-blue) !important; }
        .btn-outline-brand { color: var(--brand-blue); border-color: var(--brand-blue); }
        .btn-outline-brand:hover { background-color: var(--brand-blue); color: white; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header d-flex justify-content-between align-items-center">

                            </div>

                                <label class="form-label">Tema Principal</label>
                                <select id="tema" class="form-select" required>

                                    <optgroup label="Humor / Identificação">

                                        <option value="2. Drama Felino (Gato Gritando)">2. Drama Felino (Gato Gritando)</option>
                                        <option value="3. Confissões do Pet">3. Confissões do Pet</option>
                                    </optgroup>
                                    <optgroup label="Rotina / Lifestyle">
                                        <option value="4. Rotina com Pet Doente">4. Rotina com Pet Doente</option>
                                        <option value="5. Momento do Suplemento">5. Momento do Suplemento</option>
                                        <option value="6. Pós-Banho & Carinho">6. Pós-Banho & Carinho</option>
                                        <option value="7. Dia de Spa do Pet">7. Dia de Spa do Pet</option>
                                    </optgroup>
                                    <optgroup label="Educativo">

                                        <option value="15. E foi assim que esse cachorro de 12 anos se tornou o sénior mais saudável do bairro.">15. E foi assim que esse cachorro de 12 anos se tornou o sénior mais saudável do bairro.</option>
                                        <option value="16. Desde que a gente começou a entender a linguagem corporal dos pets do jeito certo, tudo mudou.">16. Desde que a gente começou a entender a linguagem corporal dos pets do jeito certo, tudo mudou.</option>

                                        <option value="18. É assim que a vida do seu cachorro parece antes, durante e depois de você descobrir o que ele realmente precisa.">18. É assim que a vida do seu cachorro parece antes, durante e depois de você descobrir o que ele realmente precisa.</option>

                            </div>

                            <div class="col-12">
                                <label class="form-label">Notas Adicionais (Opcional)</label>
                                <textarea id="notas" class="form-control" rows="2" placeholder="Ex: Focar no produto L-Lysine..."></textarea>
                            </div>
                            <div class="col-12 mt-3">
                                <button type="submit" id="btnGerar" class="btn btn-primary w-100 py-3 fw-bold fs-5 shadow-sm">
                                    🪄 GERAR ROTEIRO
                                </button>
                            </div>
                        </div>
                    </form>
                </div>

                <div id="loading" class="text-center d-none my-5">
                    <div class="spinner-border text-brand" style="width: 3rem; height: 3rem;" role="status"></div>
                    <h5 class="mt-4 fw-bold text-dark">Processando...</h5>
                    <p class="text-muted">A Inteligência Artificial está escrevendo o seu roteiro.</p>
                </div>

                <div id="resultadoContainer" class="card p-5 d-none border-brand border-2">
                    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                        <h4 class="m-0 text-brand fw-bold" id="resultadoTitulo">✅ Briefing Finalizado</h4>
                        <div class="d-flex gap-2">
                            <button onclick="copiarTexto()" class="btn btn-outline-brand fw-bold px-4">📋 Copiar Roteiro</button>
                            <button onclick="novaSessao()" class="btn btn-light px-4">Nova Geração</button>
                        </div>
                    </div>
                    <div id="resultado" class="p-4 bg-light rounded shadow-sm border border-light text-dark"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", carregarHistorico);

        async function carregarHistorico() {
            try {
                const response = await fetch('/api/historico');
                const roteiros = await response.json();
                
                const lista = document.getElementById('listaHistorico');
                lista.innerHTML = '';

                if(roteiros.length === 0) {
                    lista.innerHTML = '<div class="p-4 text-center text-muted small">Nenhum roteiro salvo.</div>';
                    return;
                }

                roteiros.forEach(rot => {
                    const data = new Date(rot.dataCriacao).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
                    
                    const div = document.createElement('div');
                    div.className = 'historico-item';
                    div.onclick = () => exibirRoteiroSalvo(rot);
                    
                    const temaNome = rot.tema || 'Tema Não Definido';
                    const tituloCurto = temaNome.includes('.') ? temaNome.split('.')[1].trim() : temaNome;

                    div.innerHTML = `
                        <div class="historico-titulo">${tituloCurto}</div>
                        <div class="historico-data">${data} • ${rot.mercado || 'BR'}</div>
                    `;
                    lista.appendChild(div);
                });
            } catch (error) {
                console.error("Erro ao carregar histórico", error);
            }
        }

        async function gerarRoteiro() {
            const btn = document.getElementById('btnGerar');
            const loading = document.getElementById('loading');
            const resContainer = document.getElementById('resultadoContainer');
            const resDiv = document.getElementById('resultado');

            const dados = {
                mercado: document.getElementById('mercado').value,
                narrador: document.getElementById('narrador').value,
                formato: document.getElementById('formato').value,
                tema: document.getElementById('tema').value,
                gancho: document.getElementById('gancho').value,
                notas: document.getElementById('notas').value
            };

            btn.disabled = true;
            loading.classList.remove('d-none');
            resContainer.classList.add('d-none');
            document.getElementById('painelCriacao').classList.add('d-none');

            try {
                const response = await fetch('/api/gerar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });
                const data = await response.json();
                
                resDiv.innerText = data.roteiro;
                document.getElementById('resultadoTitulo').innerText = "✅ Briefing Finalizado";
                resContainer.classList.remove('d-none');
                
                carregarHistorico();
            } catch (error) {
                alert('Erro na geração. Verifique os logs.');
                document.getElementById('painelCriacao').classList.remove('d-none');
            } finally {
                btn.disabled = false;
                loading.classList.add('d-none');
            }
        }

        function exibirRoteiroSalvo(roteiro) {
            document.getElementById('painelCriacao').classList.add('d-none');
            document.getElementById('resultadoContainer').classList.remove('d-none');
            
            const dataStr = new Date(roteiro.dataCriacao).toLocaleString('pt-BR');
            document.getElementById('resultadoTitulo').innerText = `🕒 Histórico (${dataStr})`;
            document.getElementById('resultado').innerText = roteiro.conteudo;
        }

        function novaSessao() {
            document.getElementById('resultadoContainer').classList.add('d-none');
            document.getElementById('painelCriacao').classList.remove('d-none');
            document.getElementById('formRoteiro').reset();
        }

        function copiarTexto() {
            const texto = document.getElementById('resultado').innerText;
            navigator.clipboard.writeText(texto);
            alert('Copiado com sucesso!');
        }
    </script>
</body>
</html>
